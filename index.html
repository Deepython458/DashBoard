<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=close" />

</head>
<body>
    <div class="container">
        <aside>
            <div class="top">
                <div class="logo">
                    <img src="img/logo.png" alt="" class="imagen">
                    <h2>AS<span class="danger">TRAL</span></h2>
                </div>
                <div class="close" id="close-btn">
                    <span class="material-symbols-outlined">close</span>
                </div>
            </div>
            <div class="sidebar">
                <a href="#">
                    <img src="img/dashboard.svg" alt="Dashboard">
                    <h3>Dashboard</h3>
                </a>
                <a href="#" class="active">
                    <img src="img/person.svg" alt="Dashboard">
                    <h3>Customers</h3>
                </a>
                
                <a href="#">
                    <img src="img/receipt.svg" alt="Dashboard">
                    <h3>Orders</h3>
                </a>
                <a href="#">
                    <img src="img/query.svg" alt="Dashboard">
                    <h3>Analytics</h3>
                </a>
                <a href="#">
                    <img src="img/mail.svg" alt="Dashboard">
                    <h3>Messenges</h3>
                    <span class="message-count">25</span>
                </a>
                <a href="#">
                    <img src="img/inventory.svg" alt="Dashboard">
                    <h3>Products</h3>
                </a>
                <a href="#">
                    <img src="img/report.svg" alt="Dashboard">
                    <h3>Reports</h3>
                </a>
                <a href="#">
                    <img src="img/settings.svg" alt="Dashboard">
                    <h3>Settings</h3>
                </a>
                <a href="#">
                    <img src="img/add.svg" alt="Dashboard">
                    <h3>Add Product</h3>
                </a>
                <a href="#">
                    <img src="img/logout.svg" alt="Dashboard">
                    <h3>Lagout </h3>
                </a>
            </div>
        </aside>
        <main>
            <h1>Dashboard</h1>
            <div class="date">
                <input type="date">
            </div>

            <div class="insights">
                <div class="sales">
                    <img src="img/analytics.svg" alt="">
                    <div class="middle">
                        <div class="left">
                            <h3>Total Sales</h3>
                            <h1>$25,024</h1>
                        </div>
                        <div class="progress">
                            <svg>
                                <circle cx='38' cy='38' r='36'></circle>
                            </svg>
                            <div class="number">
                                <p>81%</p>
                            </div>
                        </div>
                    </div>
                    <small class="text-muted>">Last 24 hours</small>
                </div>
                <div class="expenses">
                    <img src="img/bar_chart.svg" alt="">
                    <div class="middle">
                        <div class="left">
                            <h3>Total Expenses</h3>
                            <h1>$14,160</h1>
                        </div>
                        <div class="progress">
                            <svg>
                                <circle cx='38' cy='38' r='36'></circle>
                            </svg>
                            <div class="number">
                                <p>62%</p>
                            </div>
                        </div>
                    </div>
                    <small class="text-muted>">Last 24 hours</small>
                </div>
                <div class="income">
                    <img src="img/stacked.svg" alt="">
                    <div class="middle">
                        <div class="left">
                            <h3>Total Income</h3>
                            <h1>$10,524</h1>
                        </div>
                        <div class="progress">
                            <svg>
                                <circle cx='38' cy='38' r='36'></circle>
                            </svg>
                            <div class="number">
                                <p>44%</p>
                            </div>
                        </div>
                    </div>
                    <small class="text-muted>">Last 24 hours</small>
                </div>
            </div>
        </main>
    </div>
    
</body>
</html>
